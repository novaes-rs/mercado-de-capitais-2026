<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 04 - Renda Fixa Privada: Debêntures e Captação</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: 'Montserrat', sans-serif; background: #000; }
        
        .presentation-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .slide-frame {
            width: 1280px;
            height: 720px;
            display: none;
            border: 2px solid #00C853;
            box-shadow: 0 0 30px rgba(0, 200, 83, 0.3);
        }

        .slide-frame.active {
            display: block;
        }

        .slide-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            align-items: center;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid #00C853;
        }

        button {
            background: #00C853;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s;
        }

        button:hover {
            background: #00E676;
            transform: scale(1.05);
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .slide-counter {
            color: #00C853;
            font-weight: 700;
            font-size: 16px;
            min-width: 60px;
            text-align: center;
        }

        .slide-title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #00C853;
            font-size: 18px;
            font-weight: 700;
            z-index: 999;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 5px;
            border: 1px solid #00C853;
            max-width: 80%;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="slide-title" id="slideTitle">Slide 1 de 16</div>
    
    <div class="presentation-container">
        <div class="slide-frame active" id="slide1"><iframe src="slide_01_capa.html"></iframe></div>
        <div class="slide-frame" id="slide2"><iframe src="slide_02_agenda.html"></iframe></div>
        <div class="slide-frame" id="slide3"><iframe src="slide_03_conceito.html"></iframe></div>
        <div class="slide-frame" id="slide4"><iframe src="slide_04_elementos.html"></iframe></div>
        <div class="slide-frame" id="slide5"><iframe src="slide_05_remuneracao.html"></iframe></div>
        <div class="slide-frame" id="slide6"><iframe src="slide_06_tipos.html"></iframe></div>
        <div class="slide-frame" id="slide7"><iframe src="slide_07_incentivadas.html"></iframe></div>
        <div class="slide-frame" id="slide8"><iframe src="slide_08_rating.html"></iframe></div>
        <div class="slide-frame" id="slide9"><iframe src="slide_09_garantias.html"></iframe></div>
        <div class="slide-frame" id="slide10"><iframe src="slide_10_caso.html"></iframe></div>
        <div class="slide-frame" id="slide11"><iframe src="slide_11_tributacao.html"></iframe></div>
        <div class="slide-frame" id="slide12"><iframe src="slide_12_emissao.html"></iframe></div>
        <div class="slide-frame" id="slide13"><iframe src="slide_13_assembleias.html"></iframe></div>
        <div class="slide-frame" id="slide14"><iframe src="slide_14_atividade.html"></iframe></div>
        <div class="slide-frame" id="slide15"><iframe src="slide_15_resumo.html"></iframe></div>
        <div class="slide-frame" id="slide16"><iframe src="slide_16_referencias.html"></iframe></div>
    </div>

    <div class="controls">
        <button id="prevBtn" onclick="previousSlide()">← Anterior</button>
        <span class="slide-counter"><span id="currentSlide">1</span> / 16</span>
        <button id="nextBtn" onclick="nextSlide()">Próximo →</button>
    </div>

    <script>
        let currentSlide = 1;
        const totalSlides = 16;

        const slideNames = [
            "Capa - Renda Fixa Privada: Debêntures e Captação",
            "Agenda",
            "Conceito de Renda Fixa Privada",
            "Elementos Essenciais da Escritura",
            "Estrutura de Remuneração",
            "Tipos de Debêntures no Mercado",
            "Debêntures Incentivadas (Lei 12.431)",
            "Análise de Risco: Rating e Spread",
            "Garantias e Hierarquia de Pagamento",
            "Estudo de Caso: Por que emitir Debêntures?",
            "Tributação e Impacto no Retorno Líquido",
            "Processo de Emissão",
            "Assembleias de Debenturistas",
            "Atividade Prática - Simulador de Análise",
            "Resumo e Pontos-Chave",
            "Referências e Recursos"
        ];

        function showSlide(n) {
            if (n > totalSlides) currentSlide = totalSlides;
            if (n < 1) currentSlide = 1;

            document.querySelectorAll('.slide-frame').forEach(frame => frame.classList.remove('active'));
            document.getElementById('slide' + currentSlide).classList.add('active');
            document.getElementById('currentSlide').textContent = currentSlide;
            document.getElementById('slideTitle').textContent = `Slide ${currentSlide} de ${totalSlides}: ${slideNames[currentSlide - 1]}`;

            document.getElementById('prevBtn').disabled = currentSlide === 1;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlides;
        }

        function nextSlide() {
            currentSlide++;
            showSlide(currentSlide);
        }

        function previousSlide() {
            currentSlide--;
            showSlide(currentSlide);
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') previousSlide();
        });

        showSlide(currentSlide);
    </script>
</body>
</html>
