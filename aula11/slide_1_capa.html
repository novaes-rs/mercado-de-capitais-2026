<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #E2E8F0; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background-color: #E2E8F0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .content {
            text-align: center;
            padding: 0 80px;
            width: 100%;
        }
        .accent-line {
            width: 120px;
            height: 6px;
            background-color: #BE123C;
            margin: 0 auto 40px;
        }
        .title {
            font-size: 56px;
            font-weight: 900;
            color: #0F172A;
            line-height: 1.2;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 32px;
            font-weight: 500;
            color: #4338CA;
            margin-bottom: 80px;
        }
        .metadata {
            display: flex;
            flex-direction: column;
            gap: 20px;
            font-size: 28px;
            color: #334155;
            font-weight: 400;
        }
        .metadata-item {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .metadata-label {
            font-weight: 700;
            color: #0F172A;
            min-width: 150px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="content">
            <div class="accent-line"></div>
            <h1 class="title">O Guardião da Margem</h1>
            <h2 class="subtitle">Hedge com Futuros e Swaps</h2>
            
            <div class="metadata">
                <div class="metadata-item">
                    <span class="metadata-label">Data:</span>
                    <span>24 de Abril de 2026</span>
                </div>
                <div class="metadata-item">
                    <span class="metadata-label">Disciplina:</span>
                    <span>Mercado de Capitais e Derivativos</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
