<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #0F172A; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background-color: #0F172A;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 80px;
            overflow: hidden;
            text-align: center;
        }
        .quote-icon {
            font-size: 80px;
            color: #BE123C;
            margin-bottom: 20px; /* reduced to save vertical space */
        }
        .quote-text {
            font-size: 48px;
            font-weight: 900;
            color: #ffffff;
            line-height: 1.4;
            margin-bottom: 10px; /* reduced spacing */
            max-width: 1000px;
        }
        .quote-author {
            font-size: 32px;
            font-weight: 400;
            color: #CBD5E1;
            margin-bottom: 20px; /* reduced spacing */
            font-style: italic;
        }
        .takeaway-box {
            background-color: #ffffff;
            padding: 18px 50px; /* reduced vertical padding */
            border-left: 8px solid #4338CA;
            max-width: 900px;
        }
        .takeaway-text {
            font-size: 32px;
            font-weight: 700;
            color: #0F172A;
            line-height: 1.4;
        }
        .highlight {
            color: #BE123C;
            font-weight: 900;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <i class="fas fa-quote-left quote-icon"></i>
        
        <div class="quote-text">
            "Existem dois tipos de riscos: Aqueles que não podemos nos dar o luxo de correr e aqueles que não podemos nos dar o luxo de não correr."
        </div>
        
        <div class="quote-author">- Peter Drucker</div>
        
        <div class="takeaway-box">
            <div class="takeaway-text">
                O papel do gestor financeiro não é prever o futuro.<br>
                É <span class="highlight">proteger a margem</span>.
            </div>
        </div>
    </div>
</body>
</html>
