<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #E2E8F0; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background-color: #E2E8F0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 80px;
            overflow: hidden;
        }
        .title {
            font-size: 48px;
            font-weight: 900;
            color: #0F172A;
            margin-bottom: 40px;
            text-align: center;
        }
        .impact-box {
            background-color: #ffffff;
            border-left: 8px solid #BE123C;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .company-name {
            font-size: 32px;
            font-weight: 700;
            color: #0F172A;
        }
        .situation {
            font-size: 28px;
            color: #334155;
            line-height: 1.3;
        }
        .loss-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            align-items: flex-end;
            margin: 8px 0;
        }
        .loss-block { text-align: left; }
        .loss-label {
            font-size: 28px;
            font-weight: 700;
            color: #0F172A;
            display: block;
            margin-bottom: 6px;
        }
        .loss-number {
            font-size: 72px;
            font-weight: 900;
            color: #BE123C;
            line-height: 1;
        }
        .question {
            font-size: 32px;
            font-weight: 700;
            color: #4338CA;
            text-align: center;
            margin-top: 16px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <h1 class="title">A Semana Que Mudou Tudo: Um Caso Real</h1>
        
        <div class="impact-box">
            <div class="company-name">Exportadora de Commodities - Brasil</div>
            <div class="situation">
                Contrato fechado: 10 milhões de USD em açaí e soja<br>
                Câmbio no fechamento: R$ 5,00<br>
                Receita esperada: R$ 50 milhões
            </div>

            <div class="situation">Receita real: R$ 44 milhões</div>

            <div class="loss-row">
                <div class="loss-block">
                    <span class="loss-label">Dólar caiu para:</span>
                    <div class="loss-number">R$ 4,40</div>
                </div>
                <div class="loss-block">
                    <span class="loss-label">Perda:</span>
                    <div class="loss-number">R$ 6 MILHÕES</div>
                </div>
            </div>
        </div>
        
        <div class="question">Isso poderia ter sido evitado?</div>
    </div>
</body>
</html>
