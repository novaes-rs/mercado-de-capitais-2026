    <script>
        var currentSlide = 0;
        var totalSlides = 19;
        var presentation = document.getElementById('presentation');

        function navigate(dir) {
            currentSlide += dir;
            if (currentSlide < 0) currentSlide = 0;
            if (currentSlide >= totalSlides) currentSlide = totalSlides - 1;
            presentation.style.transform = 'translateX(-' + (currentSlide * 100) + 'vw)';
            document.getElementById('slide-counter').textContent = (currentSlide + 1) + ' / ' + totalSlides;
            document.getElementById('btn-prev').disabled = currentSlide === 0;
            document.getElementById('btn-next').disabled = currentSlide === totalSlides - 1;
        }

        // Navegação por teclado
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
                e.preventDefault(); navigate(1);
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault(); navigate(-1);
            }
        });

        // Navegação por toque (swipe)
        var touchStartX = 0;
        document.addEventListener('touchstart', function(e) { touchStartX = e.changedTouches[0].screenX; });
        document.addEventListener('touchend', function(e) {
            var diff = touchStartX - e.changedTouches[0].screenX;
            if (Math.abs(diff) > 50) navigate(diff > 0 ? 1 : -1);
        });

        // Exportar PDF
        function printSlides() {
            alert('Para exportar como PDF:\n\n1. Pressione Ctrl+P (ou Cmd+P no Mac)\n2. Selecione "Salvar como PDF"\n3. Orientação: Paisagem, Margens: Nenhuma');
        }

        // Escalar iframes para caber na viewport (16:9 = 1280x720)
        function scaleSlides() {
            var vw = window.innerWidth;
            var vh = window.innerHeight;
            var cw = 1280;
            var ch = 720;
            var scale = Math.min(vw / cw, vh / ch) * 0.97;
            var iframes = document.querySelectorAll('.slide-iframe');
            iframes.forEach(function(iframe) {
                iframe.style.transform = 'scale(' + scale + ')';
                iframe.style.transformOrigin = 'center center';
            });
        }
        window.addEventListener('resize', scaleSlides);
        window.addEventListener('load', function() {
            requestAnimationFrame(function() { requestAnimationFrame(scaleSlides); });
        });
    </script>
